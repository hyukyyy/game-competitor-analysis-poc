# Gold set for feature quality evaluation
# PM-labeled expected features for 20 well-known games.
# Used by: gca feature-quality
#
# Fields validated:
#   genre, subgenre, bm_dist.dominant_key (highest-value BM key)
#
# How to extend: add entries following the same schema.
# reviews: paste 3-5 representative review snippets (first 200 chars each).

- game_id: 0          # placeholder — matched by title at runtime
  title: "Counter-Strike 2"
  description: >
    Counter-Strike 2 is a free-to-play tactical first-person shooter.
    Teams of terrorists and counter-terrorists compete across various game modes.
  reviews:
    - "Best FPS game ever made, requires real skill and teamwork."
    - "Matchmaking is rough but the core gameplay is unmatched."
    - "Great competitive shooter, very steep learning curve."
  expected:
    genre: "Action"
    subgenre: "Tactical Shooter"
    bm_dist_dominant: "premium"   # free-to-play but cosmetics
    play_style_contains: "competitive"

